
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful, stable JSON beautifier, validator, and minifier — hostable on GitHub Pages." />
  <title>JSON Beautifier</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<style>
  
    /* ── TOKENS ────────────────────────────────────────────────────────────── */
    :root, [data-theme="light"] {
      --text-xs:   clamp(0.75rem,  0.70rem + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.80rem + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1.00rem + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.20rem + 1.25vw, 2.25rem);

      --space-1:  0.25rem; --space-2:  0.5rem;  --space-3:  0.75rem;
      --space-4:  1rem;    --space-5:  1.25rem; --space-6:  1.5rem;
      --space-8:  2rem;    --space-10: 2.5rem;  --space-12: 3rem;
      --space-16: 4rem;    --space-20: 5rem;

      --color-bg:              #f5f4f0;
      --color-surface:         #f8f7f4;
      --color-surface-2:       #fafaf8;
      --color-surface-offset:  #eceae4;
      --color-surface-dynamic: #e0ddd6;
      --color-divider:         #dbd7cf;
      --color-border:          rgba(40,37,29,.12);
      --color-text:            #1e1c17;
      --color-text-muted:      #69655e;
      --color-text-faint:      #a09c95;
      --color-text-inverse:    #f5f4f0;
      --color-primary:         #0a6a70;
      --color-primary-hover:   #084e54;
      --color-primary-active:  #063a3e;
      --color-success:         #3a6e1a;
      --color-warning:         #96521a;
      --color-error:           #9c2973;

      --radius-sm:   0.5rem;
      --radius-md:   0.875rem;
      --radius-lg:   1.25rem;
      --radius-xl:   1.75rem;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(30,28,20,.08);
      --shadow-md: 0 6px 24px rgba(30,28,20,.10);
      --shadow-lg: 0 20px 60px rgba(30,28,20,.14);
      --shadow-inset: inset 0 1px 3px rgba(30,28,20,.07);

      --trans: 180ms cubic-bezier(.16,1,.3,1);
      --font-display: 'Cabinet Grotesk', 'Inter', sans-serif;
      --font-body:    'Satoshi', 'Inter', sans-serif;
      --font-mono:    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

      /* Syntax highlight — light */
      --hl-key:    #0a6a70;
      --hl-str:    #2e7a3a;
      --hl-num:    #964219;
      --hl-bool:   #5a3db3;
      --hl-null:   #a09c95;
      --hl-brace:  #1e1c17;
      --hl-colon:  #69655e;
    }

    [data-theme="dark"] {
      --color-bg:              #111110;
      --color-surface:         #161614;
      --color-surface-2:       #1c1b19;
      --color-surface-offset:  #222120;
      --color-surface-dynamic: #2a2926;
      --color-divider:         #282724;
      --color-border:          rgba(255,255,255,.10);
      --color-text:            #e8e4dc;
      --color-text-muted:      #ada8a0;
      --color-text-faint:      #706c65;
      --color-text-inverse:    #111110;
      --color-primary:         #5dbcc4;
      --color-primary-hover:   #80cdd4;
      --color-primary-active:  #44a8b2;
      --color-success:         #7dc659;
      --color-warning:         #e8a04a;
      --color-error:           #de79b8;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.25);
      --shadow-md: 0 6px 24px rgba(0,0,0,.34);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.50);
      --shadow-inset: inset 0 1px 3px rgba(0,0,0,.30);

      --hl-key:    #5dbcc4;
      --hl-str:    #7dc659;
      --hl-num:    #e8a04a;
      --hl-bool:   #b48de8;
      --hl-null:   #706c65;
      --hl-brace:  #e8e4dc;
      --hl-colon:  #ada8a0;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) { color-scheme: dark; }
    }

    /* ── RESET ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-text-size-adjust: none; text-size-adjust: none;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth; scroll-padding-top: var(--space-16);
    }
    body {
      min-height: 100dvh;
      line-height: 1.6;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      background-image:
        radial-gradient(circle at 6% 0%, color-mix(in oklab, var(--color-primary) 10%, transparent) 0%, transparent 34%),
        radial-gradient(circle at 94% 100%, color-mix(in oklab, var(--color-primary) 7%, transparent) 0%, transparent 28%);
    }
    img, svg { display: block; max-width: 100%; }
    ul[role="list"], ol[role="list"] { list-style: none; }
    input, button, textarea, select { font: inherit; color: inherit; }
    h1,h2,h3,h4 { text-wrap: balance; line-height: 1.1; }
    p, li { text-wrap: pretty; }
    ::selection { background: color-mix(in oklab, var(--color-primary) 24%, transparent); }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    button { cursor: pointer; border: none; background: none; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────────────── */
    .skip-link {
      position: absolute; left: var(--space-4); top: var(--space-4);
      transform: translateY(-200%); z-index: 200;
      background: var(--color-primary); color: var(--color-text-inverse);
      padding: var(--space-2) var(--space-4); border-radius: var(--radius-full);
      text-decoration: none; font-size: var(--text-sm);
    }
    .skip-link:focus { transform: translateY(0); }

    .wrap {
      width: min(calc(100% - 2rem), 1260px);
      margin-inline: auto;
    }

    /* ── TOPBAR ────────────────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 80;
      backdrop-filter: blur(18px) saturate(160%);
      background: color-mix(in oklab, var(--color-bg) 80%, transparent);
      border-bottom: 1px solid var(--color-border);
    }
    .topbar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-4); padding-block: var(--space-3); min-height: 4.5rem;
    }
    .brand {
      display: inline-flex; align-items: center; gap: var(--space-3);
      text-decoration: none; color: inherit;
    }
    .logo-ring {
      width: 2.5rem; height: 2.5rem; border-radius: 0.85rem;
      display: grid; place-items: center;
      background: linear-gradient(145deg,
        color-mix(in oklab, var(--color-primary) 18%, var(--color-surface-2)),
        var(--color-surface));
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }

    .topbar-right { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }

    /* ── ICON / PILL BUTTONS ───────────────────────────────────────────────── */
    .icon-btn {
      width: 2.75rem; height: 2.75rem; border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: color-mix(in oklab, var(--color-surface) 80%, transparent);
      box-shadow: var(--shadow-sm);
      display: grid; place-items: center;
      color: var(--color-text);
      transition: all var(--trans);
    }
    .icon-btn:hover  { background: var(--color-surface-offset); transform: translateY(-1px); }
    .icon-btn:active { transform: none; }

    .pill {
      height: 2.75rem; padding-inline: var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: color-mix(in oklab, var(--color-surface) 80%, transparent);
      box-shadow: var(--shadow-sm);
      display: inline-flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-sm); text-decoration: none; color: var(--color-text);
      transition: all var(--trans);
    }
    .pill:hover { background: var(--color-surface-offset); transform: translateY(-1px); }

    /* ── HERO ──────────────────────────────────────────────────────────────── */
    .hero {
      padding-block: clamp(var(--space-8), 8vw, var(--space-16)) var(--space-8);
      display: grid; grid-template-columns: 1.3fr 0.7fr;
      gap: var(--space-8); align-items: center;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-3); margin-bottom: var(--space-4);
      border-radius: var(--radius-full);
      background: color-mix(in oklab, var(--color-primary) 10%, var(--color-surface));
      border: 1px solid color-mix(in oklab, var(--color-primary) 18%, var(--color-border));
      color: var(--color-primary); font-size: var(--text-xs);
      font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    }
    .eyebrow-dot {
      width: .5rem; height: .5rem; border-radius: 50%;
      background: var(--color-primary);
      animation: blink 2.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    .hero h1 {
      font-family: var(--font-display); font-size: var(--text-xl);
      font-weight: 800; letter-spacing: -.04em; margin-bottom: var(--space-4);
    }
    .hero p { color: var(--color-text-muted); max-width: 50ch; }
    .hero-feats {
      padding: var(--space-5); border-radius: var(--radius-xl);
      border: 1px solid var(--color-border); box-shadow: var(--shadow-lg);
      background: linear-gradient(160deg,
        color-mix(in oklab, var(--color-surface-2) 92%, transparent),
        color-mix(in oklab, var(--color-surface) 96%, transparent));
      backdrop-filter: blur(12px);
      list-style: none; display: grid; gap: var(--space-3);
      position: relative; overflow: hidden;
    }
    .hero-feats::before {
      content: ''; position: absolute; inset: auto -8% -40% auto;
      width: 12rem; aspect-ratio: 1; border-radius: 50%;
      background: radial-gradient(circle,
        color-mix(in oklab, var(--color-primary) 18%, transparent), transparent 65%);
      pointer-events: none;
    }
    .hero-feats li {
      display: flex; align-items: center; gap: var(--space-3);
      color: var(--color-text-muted); font-size: var(--text-sm);
    }
    .hero-feats li svg { color: var(--color-primary); flex: none; }

    /* ── PANEL ─────────────────────────────────────────────────────────────── */
    .panel {
      background: color-mix(in oklab, var(--color-surface) 90%, transparent);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      overflow: clip;
      backdrop-filter: blur(10px);
    }
    .panel-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: var(--space-4); flex-wrap: wrap;
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-divider);
      background: color-mix(in oklab, var(--color-surface-2) 85%, transparent);
    }
    .panel-head h2 {
      font-family: var(--font-display); font-weight: 800;
      font-size: var(--text-lg); letter-spacing: -.03em;
    }
    .panel-head p { font-size: var(--text-xs); color: var(--color-text-muted); max-width: none; }
    .panel-body { padding: var(--space-5); display: grid; gap: var(--space-5); }

    /* ── MAIN LAYOUT ───────────────────────────────────────────────────────── */
    main { padding-bottom: var(--space-8); padding-top: var(--space-8); }
    .side-stack { display: grid; gap: var(--space-4); }

    /* ── TOOLBAR ───────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex; flex-wrap: wrap; gap: var(--space-3);
      justify-content: space-between; align-items: center;
    }
    .seg {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px; border-radius: var(--radius-full);
      background: var(--color-surface-offset); border: 1px solid var(--color-border);
    }
    .seg button {
      height: 2.4rem; padding-inline: var(--space-4);
      border-radius: var(--radius-full); font-size: var(--text-sm);
      color: var(--color-text-muted);
      transition: all var(--trans);
    }
    .seg button[aria-pressed="true"] {
      background: var(--color-primary); color: var(--color-text-inverse);
      box-shadow: var(--shadow-sm);
    }
    .seg button:not([aria-pressed="true"]):hover { background: var(--color-surface-dynamic); }
    .btn-row { display: flex; flex-wrap: wrap; gap: var(--space-2); }

    /* ── ACTION BUTTONS ────────────────────────────────────────────────────── */
    .btn {
      height: 2.75rem; padding-inline: var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      box-shadow: var(--shadow-sm);
      display: inline-flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-sm); font-weight: 500;
      transition: all var(--trans);
    }
    .btn:hover  { background: var(--color-surface-offset); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn:active { transform: none; box-shadow: var(--shadow-sm); }
    .btn.primary {
      background: var(--color-primary); color: var(--color-text-inverse);
      border-color: color-mix(in oklab, var(--color-primary) 60%, black 15%);
    }
    .btn.primary:hover { background: var(--color-primary-hover); }
    label.btn { cursor: pointer; }

    /* ── EDITORS ───────────────────────────────────────────────────────────── */
    .editors { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .ed-wrap { display: grid; gap: var(--space-2); }
    .ed-topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-3);
    }
    .ed-topbar label {
      font-size: var(--text-sm); font-weight: 700; font-family: var(--font-display);
    }
    .ed-meta { font-size: var(--text-xs); color: var(--color-text-muted); }
    .ed-shell {
      position: relative; border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); overflow: hidden;
      background: var(--color-surface-2);
      box-shadow: var(--shadow-inset);
      min-height: 26rem;
    }
    .ed-shell::before {
      content: ''; position: absolute; inset: 0 auto 0 0;
      width: 3.4rem;
      background: linear-gradient(180deg,
        color-mix(in oklab, var(--color-surface-offset) 90%, transparent),
        color-mix(in oklab, var(--color-surface) 70%, transparent));
      border-right: 1px solid color-mix(in oklab, var(--color-border) 70%, transparent);
      pointer-events: none; z-index: 1;
    }
    .line-nums {
      position: absolute; top: 0; left: 0; width: 3.4rem; height: 100%;
      padding: var(--space-4) var(--space-2);
      font-family: var(--font-mono); font-size: .78rem;
      line-height: 1.65; color: var(--color-text-faint);
      text-align: right; user-select: none;
      white-space: pre; overflow: hidden;
      pointer-events: none; z-index: 2;
    }
    textarea {
      display: block; width: 100%; min-height: 26rem;
      resize: vertical; border: none; background: transparent;
      padding: var(--space-4) var(--space-4) var(--space-4) 4.1rem;
      font-family: var(--font-mono); font-size: .92rem;
      line-height: 1.65; color: var(--color-text);
      tab-size: 2; white-space: pre; overflow: auto;
      caret-color: var(--color-primary);
      position: relative; z-index: 0;
    }
    textarea:focus { outline: none; }
    textarea::placeholder { color: var(--color-text-faint); }
    textarea[readonly] { cursor: default; }
    .hidden-file { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

    /* ── STATUS BAR ────────────────────────────────────────────────────────── */
    .statusbar {
      display: flex; flex-wrap: wrap; gap: var(--space-3);
      align-items: center; justify-content: space-between;
      padding: var(--space-4) var(--space-5);
      border-top: 1px solid var(--color-divider);
      background: color-mix(in oklab, var(--color-surface-2) 84%, transparent);
      font-size: var(--text-xs);
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .chip {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: .4rem .85rem; border-radius: var(--radius-full);
      background: var(--color-surface-offset); border: 1px solid var(--color-border);
      font-size: var(--text-xs); color: var(--color-text-muted);
      transition: all var(--trans);
    }
    .chip strong { color: var(--color-text); }
    .chip.ok  {
      background: color-mix(in oklab, var(--color-success) 10%, var(--color-surface));
      color: color-mix(in oklab, var(--color-success) 80%, black 10%);
    }
    .chip.ok strong { color: inherit; }
    .chip.bad {
      background: color-mix(in oklab, var(--color-error) 10%, var(--color-surface));
      color: color-mix(in oklab, var(--color-error) 80%, black 10%);
    }
    .chip.bad strong { color: inherit; }

    /* ── MESSAGE BOX ───────────────────────────────────────────────────────── */
    .msg-box {
      padding: var(--space-4); border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: var(--color-surface-offset);
      min-height: 5.5rem;
      transition: background var(--trans), border-color var(--trans), color var(--trans);
    }
    .msg-box[data-state="ok"]  {
      background: color-mix(in oklab, var(--color-success) 9%, var(--color-surface));
      border-color: color-mix(in oklab, var(--color-success) 22%, var(--color-border));
      color: color-mix(in oklab, var(--color-success) 75%, black 15%);
    }
    .msg-box[data-state="err"] {
      background: color-mix(in oklab, var(--color-error) 9%, var(--color-surface));
      border-color: color-mix(in oklab, var(--color-error) 22%, var(--color-border));
      color: color-mix(in oklab, var(--color-error) 75%, black 10%);
    }
    .msg-box strong { display: block; margin-bottom: .25rem; font-size: var(--text-sm); }
    .msg-box p { font-size: var(--text-sm); max-width: none; }

    /* ── SIDE CARDS ────────────────────────────────────────────────────────── */
    .card {
      padding: var(--space-4); border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: color-mix(in oklab, var(--color-surface-2) 80%, transparent);
      box-shadow: var(--shadow-sm);
    }
    .card h3 {
      font-size: var(--text-sm); font-family: var(--font-display); font-weight: 700;
      letter-spacing: -.02em; margin-bottom: var(--space-2);
    }
    .card p, .card li { font-size: var(--text-sm); color: var(--color-text-muted); max-width: none; }
    .card ul { list-style: none; display: grid; gap: var(--space-2); }
    .card li { display: flex; gap: var(--space-2); }
    .card li::before { content: '·'; color: var(--color-primary); flex: none; }
    .kbd {
      border: 1px solid var(--color-border); background: var(--color-surface-2);
      border-radius: .4rem; padding: .1rem .45rem;
      font-family: var(--font-mono); font-size: .78rem;
      color: var(--color-text);
    }
    .keys-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
    .footer-note {
      padding-top: var(--space-8); padding-bottom: var(--space-6);
      text-align: center; font-size: var(--text-sm); color: var(--color-text-muted);
    }

    /* ── RESPONSIVE ────────────────────────────────────────────────────────── */
    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 1fr; }
    }
    @media (max-width: 800px) {
      .hero { grid-template-columns: 1fr; }
      .hero-feats { display: none; }
    }
    @media (max-width: 640px) {
      .editors { grid-template-columns: 1fr; }
      .panel-body { padding-inline: var(--space-4); }
      .panel-head { padding-inline: var(--space-4); }
      .statusbar { padding-inline: var(--space-4); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .btn-row { flex-wrap: wrap; }
      .topbar-inner { min-height: 3.5rem; }
    }


    .brand-text strong {
      display: block; font-family: var(--font-display); font-weight: 800;
      letter-spacing: -0.01em;
    }


.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.brand-logo {
  width: 40px;
  height: 40px;
  display: block;
}

.brand-text {
  display: flex;
  width: 200px;
  flex-direction: column;
  justify-content: center;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
  
}

    .brand-name .primary {
      color: var(--color-primary);
    }
.short-description {
  font-size: var(--text-xs); 
  color: var(--color-text-muted);
}
  
</style>
</head>
<body>
  <a class="skip-link" href="#workspace">Skip to content</a>

  <!-- TOPBAR -->
  <header class="topbar" role="banner">
    <div class="wrap topbar-inner">
      
<a class="header-brand" href="/" aria-label="JSON Beautifier home">
  <img
    class="brand-logo"
    src="https://upload.wikimedia.org/wikipedia/commons/c/c9/JSON_vector_logo.svg"
    alt="JSON logo"
    width="28"
    height="28"
    loading="eager"
    onerror="this.onerror=null;this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/JSON_vector_logo.svg/160px-JSON_vector_logo.svg.png'"
  >

  <div class="brand-text">
    <div class="brand-name">
      <span class="primary">JSON</span> Beautifier
    </div>
    <div class="short-description">
      Format · Validate · Minify
    </div>
  </div>
</a>
      
      <div class="topbar-right">
        <button class="icon-btn" type="button" id="theme-btn" aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="wrap">

    <!-- WORKSPACE -->
    <section id="workspace" class="workspace" aria-label="JSON workspace">
      <!-- MAIN PANEL -->
      <div class="panel" style="min-width:0">
        <div class="panel-head">
          <div>
            <h2>Editor</h2>
            <p>Paste raw JSON on the left. Formatted output appears on the right.</p>
          </div>
          <div class="chip-row" aria-live="polite">
            <div class="btn-row">
              <label class="btn" for="file-in" tabindex="0">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload
              </label>
              <input class="hidden-file" type="file" id="file-in" accept=".json,application/json,text/plain" tabindex="-1" />
              <button type="button" class="btn primary" id="btn-beautify">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><polyline points="4 7 4 4 20 4"/><polyline points="4 20 4 17"/><polyline points="4 12 14 12"/><line x1="4" y1="4" x2="4" y2="20"/></svg>
                Beautify
              </button>
              <button type="button" class="btn" id="btn-minify">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                Minify
              </button>
              <button type="button" class="btn" id="btn-clear">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Clear
              </button>
            </div>
          </div>
        </div>

        <div class="panel-body">
          <!-- EDITORS -->
          <div class="editors">
            <div class="ed-wrap">
              <div class="ed-topbar">
                <label for="ed-input">Input</label>
                <span class="ed-meta" id="meta-input">0 chars</span>
              </div>
              <div class="ed-shell" id="drop-zone">
                <pre class="line-nums" id="ln-input" aria-hidden="true">1</pre>
                <textarea
                  id="ed-input"
                  spellcheck="false"
                  autocorrect="off"
                  autocapitalize="off"
                  placeholder='Paste your JSON here...'
                  aria-label="Input JSON"
                ></textarea>
              </div>
            </div>
            <div class="ed-wrap">
              <div class="ed-topbar">
                <label for="ed-output">Output</label>
                <span class="ed-meta" id="meta-output">0 chars</span>
              </div>
              <div class="ed-shell">
                <pre class="line-nums" id="ln-output" aria-hidden="true">1</pre>
                <textarea
                  id="ed-output"
                  spellcheck="false"
                  readonly
                  placeholder="Formatted JSON will appear here."
                  aria-label="Output JSON"
                ></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- STATUS BAR -->
        <div class="statusbar">
          <div class="chip-row" aria-label="Document statistics" aria-live="polite">
            <span class="chip" id="chip-valid">Validity: <strong id="valid-text">—</strong></span>
            <span class="chip">Lines: <strong id="lines-text">0</strong></span>
            <span class="chip">Bytes: <strong id="bytes-text">0</strong></span>
            
            <div class="seg" role="group" aria-label="Indentation size">
              <button type="button" class="ibtn" data-ind="2"  aria-pressed="true">2 sp</button>
              <button type="button" class="ibtn" data-ind="4"  aria-pressed="false">4 sp</button>
              <button type="button" class="ibtn" data-ind="8"  aria-pressed="false">8 sp</button>
              <button type="button" class="ibtn" data-ind="\t" aria-pressed="false">Tab</button>
            </div>
            
            <span class="chip" id="chip-indent">Indent: <strong id="indent-display">2 spaces</strong></span>
            <span class="chip" id="chip-status"><strong id="status-display">Ready</strong></span>
            
            
          </div>
          <div class="btn-row">
            <button type="button" class="btn" id="btn-copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy output
            </button>
            <button type="button" class="btn" id="btn-download">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download .json
            </button>
            <button type="button" class="btn" id="btn-sample">Load sample</button>
          </div>
        </div>
      </div>

    </section>

  </main>
<script>
    /* ── THEME TOGGLE ─────────────────────────────────────────────────────── */
  (() => {
    const html = document.documentElement;
    const btn  = document.getElementById('theme-btn');
    let   mode = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    const SUN  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
    const MOON = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const apply = () => {
      html.setAttribute('data-theme', mode);
      btn.innerHTML = mode === 'dark' ? SUN : MOON;
      btn.setAttribute('aria-label', mode === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    };
    apply();
    btn.addEventListener('click', () => { mode = mode === 'dark' ? 'light' : 'dark'; apply(); });
  })();

  /* ── EDITOR APP ───────────────────────────────────────────────────────── */
  (() => {
    /* elements */
    const elIn      = document.getElementById('ed-input');
    const elOut     = document.getElementById('ed-output');
    const lnIn      = document.getElementById('ln-input');
    const lnOut     = document.getElementById('ln-output');
    const metaIn    = document.getElementById('meta-input');
    const metaOut   = document.getElementById('meta-output');
    const msgBox    = document.getElementById('msg-box');
    const statusEl  = document.getElementById('status-display');
    const indentEl  = document.getElementById('indent-display');
    const validEl   = document.getElementById('valid-text');
    const linesEl   = document.getElementById('lines-text');
    const bytesEl   = document.getElementById('bytes-text');
    const chipValid = document.getElementById('chip-valid');
    const chipSt    = document.getElementById('chip-status');
    const fileIn    = document.getElementById('file-in');
    const dropZone  = document.getElementById('drop-zone');
    const indentBtns= [...document.querySelectorAll('.ibtn')];

    let indent = 2;

    const sample = {
      app: "JSON Beautifier",
      version: "1.0.0",
      author: { name: "Sanket Priyadarshi", city: "Dhanbad" },
      features: ["beautify", "minify", "validate", "copy", "download", "dark-mode"],
      hosting: { platform: "GitHub Pages", static: true, requires_backend: false },
      keyboard: { beautify: "Ctrl+Enter", minify: "Ctrl+M", copy: "Ctrl+Shift+C" }
    };

    /* helpers */
    const bytes  = t => new Blob([t]).size;
    const nlines = t => (!t ? 0 : t.split('\n').length);

    const lineNums = (ta, target) => {
      const n = Math.max(1, ta.value.split('\n').length);
      if (target._prev === n) return;
      target._prev = n;
      target.textContent = Array.from({length: n}, (_,i) => i + 1).join('\n');
    };

    const syncScroll = (ta, ln) => { ln.scrollTop = ta.scrollTop; };

    const setMsg = (title, body, state = 'idle') => {
      msgBox.dataset.state = state;
      msgBox.innerHTML = `<strong>${title}</strong><p>${body}</p>`;
    };

    const setStatus = (text, cls = '') => {
      statusEl.textContent = text;
      chipSt.className = 'chip' + (cls ? ' ' + cls : '');
    };

    const setValidity = (valid, empty = false) => {
      if (empty) {
        validEl.textContent = '—';
        chipValid.className = 'chip';
      } else {
        validEl.textContent = valid ? 'Valid JSON' : 'Invalid JSON';
        chipValid.className = valid ? 'chip ok' : 'chip bad';
      }
    };

    const updateStats = (text) => {
      linesEl.textContent = String(nlines(text));
      bytesEl.textContent = String(bytes(text));
    };

    const refreshMeta = () => {
      metaIn.textContent  = `${elIn.value.length} chars`;
      metaOut.textContent = `${elOut.value.length} chars`;
      lineNums(elIn, lnIn);
      lineNums(elOut, lnOut);
    };

    /* indent control */
    indentBtns.forEach(b => {
      b.addEventListener('click', () => {
        indent = b.dataset.ind === '\t' ? '\t' : Number(b.dataset.ind);
        const label = b.dataset.ind === '\t' ? 'Tab' : `${b.dataset.ind} spaces`;
        indentEl.textContent = label;
        indentBtns.forEach(x => x.setAttribute('aria-pressed', String(x === b)));
        if (elOut.value) beautify();
      });
    });

    /* prettify error from JSON.parse */
    const parseJSON = raw => {
      if (!raw.trim()) throw new Error('Input is empty — please paste some JSON first.');
      return JSON.parse(raw);
    };

    const beautify = () => {
      try {
        const parsed    = parseJSON(elIn.value);
        const formatted = JSON.stringify(parsed, null, indent);
        elOut.value     = formatted;
        refreshMeta();
        updateStats(formatted);
        setValidity(true);
        setStatus('Beautified ✓', 'ok');
        const sp = typeof indent === 'number' ? `${indent} spaces` : 'tabs';
        setMsg('Beautified successfully', `Valid JSON formatted with ${sp} of indentation.`, 'ok');
      } catch (e) {
        elOut.value = '';
        refreshMeta();
        updateStats('');
        setValidity(false);
        setStatus('Error', 'bad');
        setMsg('Parse error', escapeHTML(e.message), 'err');
      }
    };

    const minify = () => {
      try {
        const parsed   = parseJSON(elIn.value);
        const minified = JSON.stringify(parsed);
        elOut.value    = minified;
        refreshMeta();
        updateStats(minified);
        setValidity(true);
        setStatus('Minified ✓', 'ok');
        setMsg('Minified successfully', 'All unnecessary whitespace has been removed.', 'ok');
      } catch (e) {
        elOut.value = '';
        refreshMeta();
        updateStats('');
        setValidity(false);
        setStatus('Error', 'bad');
        setMsg('Parse error', escapeHTML(e.message), 'err');
      }
    };

    const clearAll = () => {
      elIn.value  = '';
      elOut.value = '';
      refreshMeta();
      updateStats('');
      setValidity(false, true);
      setStatus('Ready');
      setMsg('Cleared', 'Both editors are now empty and ready for a new payload.');
    };

    const copyOut = async () => {
      if (!elOut.value) {
        setMsg('Nothing to copy', 'Generate output first.', 'err');
        return;
      }
      try {
        await navigator.clipboard.writeText(elOut.value);
      } catch {
        elOut.removeAttribute('readonly');
        elOut.select();
        document.execCommand('copy');
        elOut.setAttribute('readonly', '');
      }
      setStatus('Copied ✓', 'ok');
      setMsg('Copied to clipboard', 'The formatted JSON is ready to paste.', 'ok');
    };

    const download = () => {
      if (!elOut.value) { setMsg('Nothing to download', 'Generate output first.', 'err'); return; }
      const blob = new Blob([elOut.value], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: 'formatted.json' });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setMsg('Download started', 'Your formatted JSON file is being saved.', 'ok');
    };

    const loadSample = () => {
      elIn.value = JSON.stringify(sample);
      beautify();
    };

    const escapeHTML = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const loadFile = async file => {
      if (!file) return;
      try {
        elIn.value = await file.text();
        refreshMeta();
        setMsg('File loaded', `${escapeHTML(file.name)} loaded — click Beautify to format it.`, 'ok');
        setStatus('Loaded');
      } catch (e) {
        setMsg('Upload failed', escapeHTML(e.message), 'err');
        setStatus('Error', 'bad');
      }
    };

    /* events */
    document.getElementById('btn-beautify').addEventListener('click', beautify);
    document.getElementById('btn-minify').addEventListener('click', minify);
    document.getElementById('btn-clear').addEventListener('click', clearAll);
    document.getElementById('btn-copy').addEventListener('click', copyOut);
    document.getElementById('btn-download').addEventListener('click', download);
    document.getElementById('btn-sample').addEventListener('click', loadSample);

    fileIn.addEventListener('change', e => { loadFile(e.target.files[0]); fileIn.value = ''; });

    elIn.addEventListener('input', () => {
      refreshMeta();
      if (!elIn.value.trim()) { setValidity(false, true); updateStats(''); setStatus('Ready'); }
      else { setStatus('Editing'); }
    });
    elIn.addEventListener('scroll',  () => syncScroll(elIn,  lnIn));
    elOut.addEventListener('scroll', () => syncScroll(elOut, lnOut));

    /* drag-and-drop */
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.outline = '2px dashed var(--color-primary)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.outline = ''; });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.outline = '';
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    /* keyboard shortcuts */
    document.addEventListener('keydown', e => {
      const ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && e.key === 'Enter')                         { e.preventDefault(); beautify(); }
      if (ctrl && e.key.toLowerCase() === 'm' && !e.shiftKey){ e.preventDefault(); minify();   }
      if (ctrl && e.shiftKey && e.key.toLowerCase() === 'c') { e.preventDefault(); copyOut();  }
      if (ctrl && e.shiftKey && e.key.toLowerCase() === 'x') { e.preventDefault(); clearAll(); }
    });

    /* init */
    refreshMeta();
    loadSample();
  })();

</script>
</body>
</html>
