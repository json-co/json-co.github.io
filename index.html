
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful, stable JSON beautifier, validator, and minifier — hostable on GitHub Pages." />
  <title>JSON Beautifier</title>

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/c/c9/JSON_vector_logo.svg">
  <link rel="alternate icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/JSON_vector_logo.svg/160px-JSON_vector_logo.svg.png">

  <script>
    (() => {
      const saved = (() => { try { return localStorage.getItem("json-theme"); } catch { return null; } })();
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
    })();
  </script>

  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root,
    [data-theme="light"] {
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

      --space-1:  0.25rem;
      --space-2:  0.5rem;
      --space-3:  0.75rem;
      --space-4:  1rem;
      --space-5:  1.25rem;
      --space-6:  1.5rem;
      --space-8:  2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --space-16: 4rem;

      --color-bg:             #f5f4f0;
      --color-surface:        #f8f7f4;
      --color-surface-2:      #fafaf8;
      --color-surface-offset: #eceae4;
      --color-surface-dynamic:#e0ddd6;
      --color-divider:        #dbd7cf;
      --color-border:         rgba(40, 37, 29, 0.12);
      --color-text:           #1e1c17;
      --color-text-muted:     #69655e;
      --color-text-faint:     #a09c95;
      --color-text-inverse:   #f5f4f0;
      --color-primary:        #0a6a70;
      --color-primary-hover:  #084e54;
      --color-primary-active: #063a3e;
      --color-success:        #3a6e1a;
      --color-warning:        #96521a;
      --color-error:          #9c2973;

      --radius-sm:   0.5rem;
      --radius-md:   0.875rem;
      --radius-lg:   1.25rem;
      --radius-xl:   1.75rem;
      --radius-full: 9999px;

      --shadow-sm:    0 1px 3px rgba(30, 28, 20, 0.08);
      --shadow-md:    0 6px 24px rgba(30, 28, 20, 0.1);
      --shadow-lg:    0 20px 60px rgba(30, 28, 20, 0.14);
      --shadow-inset: inset 0 1px 3px rgba(30, 28, 20, 0.07);

      --trans:        180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-display: "Inter", sans-serif;
      --font-body:    "Inter", sans-serif;
      --font-mono:    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    [data-theme="dark"] {
      --color-bg:             #111110;
      --color-surface:        #161614;
      --color-surface-2:      #1c1b19;
      --color-surface-offset: #222120;
      --color-surface-dynamic:#2a2926;
      --color-divider:        #282724;
      --color-border:         rgba(255, 255, 255, 0.1);
      --color-text:           #e8e4dc;
      --color-text-muted:     #ada8a0;
      --color-text-faint:     #706c65;
      --color-text-inverse:   #111110;
      --color-primary:        #5dbcc4;
      --color-primary-hover:  #80cdd4;
      --color-primary-active: #44a8b2;
      --color-success:        #7dc659;
      --color-warning:        #e8a04a;
      --color-error:          #de79b8;

      --shadow-sm:    0 1px 3px rgba(0, 0, 0, 0.25);
      --shadow-md:    0 6px 24px rgba(0, 0, 0, 0.34);
      --shadow-lg:    0 20px 60px rgba(0, 0, 0, 0.5);
      --shadow-inset: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    /* ── Base reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
      scroll-padding-top: var(--space-16);
    }

    body {
      min-height: 100dvh;
      line-height: 1.6;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background-color: var(--color-bg);
      background-image:
        radial-gradient(circle at 6% 0%,   rgba(10, 106, 112, 0.08) 0%, transparent 34%),
        radial-gradient(circle at 94% 100%, rgba(10, 106, 112, 0.05) 0%, transparent 28%);
    }

    img, svg { display: block; max-width: 100%; }
    input, button, textarea, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    h1, h2, h3, h4 { line-height: 1.1; }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    ::selection { background: rgba(10, 106, 112, 0.2); }

    /* ── Utilities ────────────────────────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0;
    }

    .wrap { margin: 0 2rem; }

    /* ── Top bar ──────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 80;
      backdrop-filter: blur(18px) saturate(160%);
      background: rgba(248, 247, 244, 0.82);
      border-bottom: 1px solid var(--color-border);
    }
    [data-theme="dark"] .topbar { background: rgba(22, 22, 20, 0.82); }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding-block: var(--space-3);
      min-height: 4.5rem;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }

    .brand-logo-wrap { display: grid; place-items: center; flex: none; }
    .brand-logo { width: 40px; height: 40px; }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .brand-name {
      font-family: system-ui;
      font-weight: 800;
      letter-spacing: -0.01em;
      font-size: var(--text-base);
      margin-bottom: -5px;
    }
    .brand-name .primary { color: var(--color-primary); }

    .short-description {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .icon-btn {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
      color: var(--color-text);
      transition: all var(--trans);
      flex: none;
    }
    .icon-btn:hover  { background: var(--color-surface-offset); transform: translateY(-1px); }
    .icon-btn:active { transform: none; }

    /* ── Main layout ──────────────────────────────────────────── */
    main { padding-top: var(--space-8); padding-bottom: var(--space-8); }

    .workspace { display: grid; gap: var(--space-4); }

    .panel {
      background: rgba(248, 247, 244, 0.9);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      overflow: clip;
      backdrop-filter: blur(10px);
      min-width: 0;
    }
    [data-theme="dark"] .panel { background: rgba(22, 22, 20, 0.9); }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface-2);
    }
    .panel-head h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: var(--text-lg);
      letter-spacing: -0.03em;
    }
    .panel-head p {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      max-width: none;
    }

    .panel-body { padding: var(--space-5); display: grid; gap: var(--space-5); }

    /* ── Toolbar / Buttons ────────────────────────────────────── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      justify-content: space-between;
      align-items: center;
    }

    .btn-row { display: flex; flex-wrap: wrap; gap: var(--space-2); }

    .btn {
      height: 2.75rem;
      padding-inline: var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 500;
      transition: all var(--trans);
      min-height: 44px;
    }
    .btn:hover  { background: var(--color-surface-offset); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn:active { transform: none; box-shadow: var(--shadow-sm); }
    .btn.primary { background: var(--color-primary); color: var(--color-text-inverse); border-color: transparent; }
    .btn.primary:hover { background: var(--color-primary-hover); }

    /* ── Editors ──────────────────────────────────────────────── */
    .editors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    .ed-wrap { display: grid; gap: var(--space-2); min-width: 0; }

    .ed-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }
    .ed-topbar label {
      font-size: var(--text-sm);
      font-weight: 700;
      font-family: var(--font-display);
    }
    .ed-meta { font-size: var(--text-xs); color: var(--color-text-muted); }

    .ed-shell {
      position: relative;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-surface-2);
      box-shadow: var(--shadow-inset);
      min-height: 26rem;
    }
    .ed-shell::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3.4rem;
      background: linear-gradient(180deg, var(--color-surface-offset), var(--color-surface));
      border-right: 1px solid var(--color-border);
      pointer-events: none;
      z-index: 3; /* above overlay */
    }

    .line-nums {
      position: absolute;
      top: 0; left: 0;
      width: 3.4rem;
      height: 100%;
      padding: var(--space-4) var(--space-2);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: calc(0.92rem * 1.65); /* = 1.518rem — exact match with textarea */
      color: var(--color-text-faint);
      text-align: right;
      user-select: none;
      white-space: pre;
      overflow: hidden;
      pointer-events: none;
      z-index: 4; /* always on top */
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 34rem;
      resize: vertical;
      border: none;
      background: transparent;
      padding: var(--space-4) var(--space-4) var(--space-4) 4.1rem;
      font-family: var(--font-mono);
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--color-text);
      tab-size: 2;
      white-space: pre;
      overflow: auto;
      caret-color: var(--color-primary);
      position: relative;
      z-index: 2;
    }
    textarea:focus        { outline: none; }
    textarea::placeholder { color: var(--color-text-faint); }
    textarea[readonly]    { cursor: default; }

    .hidden-file {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Syntax-highlight overlay (output only) ───────────────── */

    /* Make output textarea text invisible — overlay provides colour */
    #ed-output {
      color: transparent;
      caret-color: transparent;
    }
    /* Restore placeholder colour */
    #ed-output::placeholder { color: var(--color-text-faint); }

    /* Overlay sits between the textarea and the line-nums/gutter */
    .highlight-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: var(--space-4) var(--space-4) var(--space-4) 4.1rem;
      font-family: var(--font-mono);
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre;
      overflow: auto;
      scrollbar-width: none;        /* Firefox — hide scrollbar */
      pointer-events: none;
      z-index: 2; /* same as textarea so it paints over transparent text */
      background: transparent;
      tab-size: 2;
      margin: 0;
      border: none;
      word-break: normal;
    }
    .highlight-overlay::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    /* Token colours — light theme */
    .json-key   { color: #0a6a70; font-weight: 600; }
    .json-str   { color: #b45309; }
    .json-num   { color: #7c3aed; }
    .json-bool  { color: #1d4ed8; }
    .json-null  { color: #9c2973; }
    .json-punct { color: #69655e; }

    /* Token colours — dark theme */
    [data-theme="dark"] .json-key   { color: #5dbcc4; }
    [data-theme="dark"] .json-str   { color: #f59e0b; }
    [data-theme="dark"] .json-num   { color: #a78bfa; }
    [data-theme="dark"] .json-bool  { color: #60a5fa; }
    [data-theme="dark"] .json-null  { color: #de79b8; }
    [data-theme="dark"] .json-punct { color: #ada8a0; }

    /* ── Message box ──────────────────────────────────────────── */
    .msg-box {
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: var(--color-surface-offset);
      min-height: 5.5rem;
      transition: background var(--trans), border-color var(--trans), color var(--trans);
    }
    .msg-box[data-state="ok"] {
      background: rgba(58, 110, 26, 0.08);
      border-color: rgba(58, 110, 26, 0.2);
      color: var(--color-success);
    }
    .msg-box[data-state="err"] {
      background: rgba(156, 41, 115, 0.08);
      border-color: rgba(156, 41, 115, 0.2);
      color: var(--color-error);
    }
    .msg-box strong { display: block; margin-bottom: 0.25rem; font-size: var(--text-sm); }
    .msg-box p      { font-size: var(--text-sm); max-width: none; }

    /* ── Status bar ───────────────────────────────────────────── */
    .statusbar {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5);
      border-top: 1px solid var(--color-divider);
      background: var(--color-surface-2);
      font-size: var(--text-xs);
    }

    .chip-row { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: center; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0.4rem 0.85rem;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      transition: all var(--trans);
    }
    .chip strong          { color: var(--color-text); }
    .chip.ok              { background: rgba(58, 110, 26, 0.08); color: var(--color-success); }
    .chip.ok strong,
    .chip.bad strong      { color: inherit; }
    .chip.bad             { background: rgba(156, 41, 115, 0.08); color: var(--color-error); }

    .seg {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
    }
    .seg button {
      height: 2.4rem;
      padding-inline: var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      transition: all var(--trans);
      min-height: 44px;
    }
    .seg button[aria-pressed="true"] {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-sm);
    }
    .seg button:not([aria-pressed="true"]):hover { background: var(--color-surface-dynamic); }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 800px) {
      .editors { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .panel-body,
      .panel-head,
      .statusbar    { padding-inline: var(--space-4); }
      .toolbar      { flex-direction: column; align-items: stretch; }
      .topbar-inner { min-height: 3.75rem; }
      .header-brand { min-width: 0; }
      .brand-text   { max-width: 13rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  
    /* ── Output view toggle ─────────────────────────────────── */
    .out-view-seg {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px;
      border-radius: var(--radius-full);
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
    }
    .vbtn {
      padding-inline: var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      transition: all var(--trans);
      cursor: pointer;
      border: none;
      background: none;
    }
    .vbtn[aria-pressed="true"] {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      box-shadow: var(--shadow-sm);
    }
    .vbtn:not([aria-pressed="true"]):hover { background: var(--color-surface-dynamic); }

    /* ── Tree actions ───────────────────────────────────────── */
    .tree-actions {
      display: none;
      align-items: center;
      gap: var(--space-2);
    }
    .tree-actions.visible { display: inline-flex; }
    .tree-act-btn {
      height: 1.6rem;
      padding-inline: var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      cursor: pointer;
      transition: all var(--trans);
    }
    .tree-act-btn:hover {
      background: var(--color-surface-offset);
      color: var(--color-text);
    }

    /* ── Tree shell ─────────────────────────────────────────── */
    .tree-shell {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: auto;
      background: var(--color-surface-2);
      box-shadow: var(--shadow-inset);
      min-height: 26rem;
    }
    .tree-view {
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-mono);
      font-size: 0.92rem;
      line-height: 1.65;
      min-width: max-content;
    }

    /* ── Tree nodes ─────────────────────────────────────────── */
    .tn { display: block; }
    .tn-row {
      display: flex;
      align-items: center;
      gap: 0.25em;
      padding: 0.06em 3px;
      border-radius: var(--radius-sm);
      margin: 0 -3px;
      white-space: nowrap;
    }
    .tn-row:hover { background: var(--color-surface-offset); }
    .tn-row.clickable { cursor: pointer; }

    .tn-toggle {
      flex: none;
      width: 1.15rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-faint);
      user-select: none;
    }
    .tn-toggle svg {
      width: 0.75rem;
      height: 0.75rem;
      transition: transform var(--trans), color var(--trans);
      fill: currentColor;
    }
    .tn-row.clickable:hover .tn-toggle { color: var(--color-primary); }
    .tn-row.is-open .tn-toggle svg   { transform: rotate(90deg); }
    .tn-row.is-closed .tn-toggle svg { transform: rotate(0deg); }

    .tn-children {
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      transition: grid-template-rows 180ms ease;
    }
    .tn-children.collapsed { grid-template-rows: 0fr; }
    .tn-inner { min-height: 0; }

    .tn-body {
      padding-left: 1.35rem;
      position: relative;
    }
    .tn-body::before {
      content: "";
      position: absolute;
      left: 0.52rem;
      top: 0;
      bottom: 0.4rem;
      width: 1px;
      background: var(--color-divider);
      border-radius: 1px;
    }

    .tn-summary {
      display: none;
      color: var(--color-text-faint);
      font-style: italic;
      font-size: 0.86em;
    }
    .tn-row.is-closed .tn-summary { display: inline; }

    .json-index {
      color: var(--color-primary);
      font-weight: 600;
      font-size: 0.86em;
    }

  </style>
</head>
<body>
  <!-- ── Header ──────────────────────────────────────────────── -->
  <header class="topbar" role="banner">
    <div class="wrap topbar-inner">
      <a class="header-brand" href="./" aria-label="JSON Beautifier">

  <!-- ── Main ────────────────────────────────────────────────── -->
  <main class="wrap" id="main-content">

      <div class="panel">

  <!-- ── Scripts ─────────────────────────────────────────────── -->
  <script>
    /* ── Theme toggle ─────────────────────────────────────────── */
    (() => {
      const html = document.documentElement;
      const btn  = document.getElementById("theme-btn");

      const icons = {
        sun: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5"></circle>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>`,
        moon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>`,
      };

      let mode = html.getAttribute("data-theme") || "light";

      const applyTheme = () => {
        html.setAttribute("data-theme", mode);
        btn.innerHTML = mode === "dark" ? icons.sun : icons.moon;
        btn.setAttribute("aria-label", mode === "dark" ? "Switch to light mode" : "Switch to dark mode");
        btn.title = mode === "dark" ? "Light mode" : "Dark mode";
      };

      btn.addEventListener("click", () => {
        mode = mode === "dark" ? "light" : "dark";
        try { localStorage.setItem("json-theme", mode); } catch (_) { /* sandboxed — ignore */ }
        applyTheme();
      });

      applyTheme();
    })();

    /* ── Editor logic ─────────────────────────────────────────── */
    (() => {
      /* DOM refs */
      const elIn        = document.getElementById("ed-input");
      const elOut       = document.getElementById("ed-output");
      const lnIn        = document.getElementById("ln-input");
      const lnOut       = document.getElementById("ln-output");
      const metaIn      = document.getElementById("meta-input");
      const metaOut     = document.getElementById("meta-output");
      const msgBox      = document.getElementById("msg-box");
      const statusEl    = document.getElementById("status-display");
      const indentEl    = document.getElementById("indent-display");
      const validEl     = document.getElementById("valid-text");
      const linesEl     = document.getElementById("lines-text");
      const bytesEl     = document.getElementById("bytes-text");
      const chipValid   = document.getElementById("chip-valid");
      const chipStatus  = document.getElementById("chip-status");
      const fileIn      = document.getElementById("file-in");
      const dropZone    = document.getElementById("drop-zone");
      const btnUpload   = document.getElementById("btn-upload");
      const indentBtns  = Array.from(document.querySelectorAll(".ibtn"));
      const highlightOut = document.getElementById("highlight-output"); /* ← highlight overlay */
      const treeViewEl   = document.getElementById("tree-view");
      const treeShell    = document.getElementById("tree-shell");
      const outEdShell   = elOut.closest(".ed-shell");
      const treeActionsEl = document.getElementById("tree-actions");
      const viewRawBtn   = document.getElementById("view-raw");
      const viewTreeBtn  = document.getElementById("view-tree");

      let indent = 2;

      const sample = {
        app: "JSON Beautifier",
        version: "1.0.0",
        features: ["beautify", "minify", "validate", "copy", "download", "dark-mode"],
        hosting: { platform: "GitHub", static: true },
        keyboard: { beautify: "Ctrl+Enter", minify: "Ctrl+M" }
      };

      /* ── Helpers ──────────────────────────────────────────── */
      const getBytes = (text) => new Blob([text]).size;
      const getLines = (text) => (text ? text.split("\n").length : 0);

      const updateLineNumbers = (textarea, target) => {
        const total = Math.max(1, textarea.value.split("\n").length);
        if (target._prev === total) return;
        target._prev = total;
        target.textContent = Array.from({ length: total }, (_, i) => i + 1).join("\n");
      };

      const syncScroll = (textarea, lineNums) => {
        lineNums.scrollTop = textarea.scrollTop;
      };

      const setMsg = (title, body, state = "idle") => {
        msgBox.dataset.state = state;
        msgBox.innerHTML = "";
        const strong = document.createElement("strong");
        const p = document.createElement("p");
        strong.textContent = title;
        p.textContent = body;
        msgBox.append(strong, p);
      };

      const setStatus = (text, cls = "") => {
        statusEl.textContent = text;
        chipStatus.className = "chip" + (cls ? ` ${cls}` : "");
      };

      const setValidity = (isValid, empty = false) => {
        if (empty) {
          validEl.textContent = "—";
          chipValid.className = "chip";
          return;
        }
        validEl.textContent = isValid ? "Valid JSON" : "Invalid JSON";
        chipValid.className  = isValid ? "chip ok"   : "chip bad";
      };

      const updateStats = (text) => {
        linesEl.textContent = String(getLines(text));
        bytesEl.textContent = String(getBytes(text));
      };

      const refreshMeta = () => {
        metaIn.textContent  = `${elIn.value.length} chars`;
        metaOut.textContent = `${elOut.value.length} chars`;
        updateLineNumbers(elIn,  lnIn);
        updateLineNumbers(elOut, lnOut);
      };

      const parseJSON = (raw) => {
        if (!raw.trim()) throw new Error("Input is empty, please paste some JSON first.");
        return JSON.parse(raw);
      };

      /* ── Syntax highlighter ───────────────────────────────── */
      /**
       * Tokenises a JSON string and returns an HTML string with
       * <span class="json-*"> wrappers for each token type.
       * Handles: keys, string values, numbers, booleans, null, punctuation.
       */
      const syntaxHighlight = (json) => {
        if (!json) return "";
        let result = "";
        let i = 0;
        const len = json.length;

        while (i < len) {
          const ch = json[i];

          /* ── Whitespace — pass through unchanged ──────────── */
          if (ch === " " || ch === "\n" || ch === "\r" || ch === "\t") {
            result += ch;
            i++;
            continue;
          }

          /* ── String literal ───────────────────────────────── */
          if (ch === '"') {
            let str = '"';
            i++; // consume opening quote
            while (i < len) {
              const c = json[i++];
              str += c;
              if (c === "\\") {
                // escaped character — consume the next char verbatim
                if (i < len) str += json[i++];
              } else if (c === '"') {
                break; // closing quote
              }
            }

            // Lookahead: is this string a key?
            // Skip whitespace then check for ':'
            let j = i;
            while (j < len && (json[j] === " " || json[j] === "\t")) j++;
            const isKey = json[j] === ":";

            // Escape HTML entities inside the token
            const safe = str
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");

            result += `<span class="${isKey ? "json-key" : "json-str"}">${safe}</span>`;
            continue;
          }

          /* ── Number ───────────────────────────────────────── */
          if (ch === "-" || (ch >= "0" && ch <= "9")) {
            let num = "";
            while (i < len && /[-\d.eE+]/.test(json[i])) num += json[i++];
            result += `<span class="json-num">${num}</span>`;
            continue;
          }

          /* ── Literals ─────────────────────────────────────── */
          if (json.startsWith("true",  i)) { result += '<span class="json-bool">true</span>';  i += 4; continue; }
          if (json.startsWith("false", i)) { result += '<span class="json-bool">false</span>'; i += 5; continue; }
          if (json.startsWith("null",  i)) { result += '<span class="json-null">null</span>';  i += 4; continue; }

          /* ── Structural punctuation ───────────────────────── */
          if ("{}[],:".includes(ch)) {
            result += `<span class="json-punct">${ch}</span>`;
            i++;
            continue;
          }

          /* ── Fallback — pass through ──────────────────────── */
          result += ch;
          i++;
        }

        return result;
      };

      let outputMode = "raw";
      let collapsibleNodes = [];

      /* Writes value to the output textarea AND refreshes the overlay */
      const setOutput = (value) => {
        elOut.value = value;
        highlightOut.innerHTML = syntaxHighlight(value);
        if (outputMode === "tree") renderTree(value);
      };

      const _typeOf = (v) => {
        if (v === null) return "null";
        if (Array.isArray(v)) return "array";
        return typeof v;
      };

      const _punct = (ch) => {
        const s = document.createElement("span");
        s.className = "json-punct";
        s.textContent = ch;
        return s;
      };

      const _caretSVG = () => {
        const svg  = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        svg.setAttribute("viewBox", "0 0 8 8");
        path.setAttribute("d", "M2 1.5 L6 4 L2 6.5 Z");
        svg.appendChild(path);
        return svg;
      };

      const _buildNode = (value, key, isLast) => {
        const type = _typeOf(value);
        const isComplex = type === "object" || type === "array";
        const node = document.createElement("div");
        node.className = "tn";

        const row = document.createElement("div");
        row.className = isComplex ? "tn-row clickable is-open" : "tn-row";

        const tri = document.createElement("span");
        tri.className = "tn-toggle";
        if (isComplex) tri.appendChild(_caretSVG());
        row.appendChild(tri);

        if (key !== null) {
          const ks = document.createElement("span");
          if (typeof key === "number") {
            ks.className = "json-index";
            ks.textContent = "[" + key + "]";
          } else {
            ks.className = "json-key";
            ks.textContent = '"' + key + '"';
          }
          row.appendChild(ks);
          row.appendChild(_punct(": "));
        }

        if (!isComplex) {
          const vs = document.createElement("span");
          if (type === "string") {
            vs.className = "json-str";
            vs.textContent = JSON.stringify(value);
          } else if (type === "number") {
            vs.className = "json-num";
            vs.textContent = String(value);
          } else if (type === "boolean") {
            vs.className = "json-bool";
            vs.textContent = String(value);
          } else if (type === "null") {
            vs.className = "json-null";
            vs.textContent = "null";
          }
          row.appendChild(vs);
          if (!isLast) row.appendChild(_punct(","));
          node.appendChild(row);
          return node;
        }

        const isArr = type === "array";
        const entries = isArr ? value : Object.keys(value);
        const count = entries.length;
        const open  = isArr ? "[" : "{";
        const close = isArr ? "]" : "}";

        row.appendChild(_punct(open));

        const summary = document.createElement("span");
        summary.className = "tn-summary";
        if (count === 0) {
          summary.textContent = " " + close;
        } else if (isArr) {
          summary.textContent = " … (" + count + " items) " + close;
        } else {
          summary.textContent = " … (" + count + " keys) " + close;
        }
        row.appendChild(summary);
        node.appendChild(row);

        if (count === 0) {
          row.appendChild(_punct(close));
          if (!isLast) row.appendChild(_punct(","));
          return node;
        }

        const childrenWrap = document.createElement("div");
        childrenWrap.className = "tn-children";
        const inner = document.createElement("div");
        inner.className = "tn-inner";
        const body = document.createElement("div");
        body.className = "tn-body";

        entries.forEach((item, idx) => {
          const childKey = isArr ? idx : item;
          const childVal = isArr ? item : value[item];
          body.appendChild(_buildNode(childVal, childKey, idx === entries.length - 1));
        });

        inner.appendChild(body);

        const closeRow = document.createElement("div");
        closeRow.className = "tn-row";
        const emptyTri = document.createElement("span");
        emptyTri.className = "tn-toggle";
        closeRow.appendChild(emptyTri);
        closeRow.appendChild(_punct(close));
        if (!isLast) closeRow.appendChild(_punct(","));
        inner.appendChild(closeRow);

        childrenWrap.appendChild(inner);
        node.appendChild(childrenWrap);

        let collapsed = false;
        const doToggle = (force) => {
          collapsed = force !== undefined ? force : !collapsed;
          childrenWrap.classList.toggle("collapsed", collapsed);
          row.classList.toggle("is-open", !collapsed);
          row.classList.toggle("is-closed", collapsed);
        };
        row.addEventListener("click", () => doToggle());
        collapsibleNodes.push(doToggle);

        return node;
      };

      const renderTree = (jsonStr) => {
        treeViewEl.innerHTML = "";
        collapsibleNodes = [];
        if (!jsonStr) return;
        try {
          treeViewEl.appendChild(_buildNode(JSON.parse(jsonStr), null, true));
        } catch {
          treeViewEl.textContent = "Invalid JSON";
        }
      };

      const collapseAll = () => collapsibleNodes.forEach((fn) => fn(true));
      const expandAll   = () => collapsibleNodes.forEach((fn) => fn(false));

      const setViewMode = (mode) => {
        outputMode = mode;
        const isRaw = mode === "raw";
        if (!isRaw) {
          const h = outEdShell.getBoundingClientRect().height;
          treeShell.style.height = h + "px";
          treeShell.style.minHeight = "0";
        } else {
          treeShell.style.height = "";
          treeShell.style.minHeight = "";
        }
        outEdShell.hidden = !isRaw;
        treeShell.hidden = isRaw;
        treeActionsEl.classList.toggle("visible", !isRaw);
        viewRawBtn.setAttribute("aria-pressed", String(isRaw));
        viewTreeBtn.setAttribute("aria-pressed", String(!isRaw));
        if (!isRaw && elOut.value) renderTree(elOut.value);
      };

      /* ── Core actions ─────────────────────────────────────── */
      const beautify = () => {
        try {
          const parsed    = parseJSON(elIn.value);
          const formatted = JSON.stringify(parsed, null, indent);
          setOutput(formatted);
          refreshMeta();
          updateStats(formatted);
          setValidity(true);
          setStatus("Beautified ✓", "ok");
          setMsg(
            "Beautified successfully",
            `Valid JSON formatted with ${typeof indent === "number" ? `${indent} spaces` : "tabs"} of indentation.`,
            "ok"
          );
        } catch (error) {
          setOutput("");
          refreshMeta();
          updateStats("");
          setValidity(false);
          setStatus("Error", "bad");
          setMsg("Parse error", error.message, "err");
        }
      };

      const minify = () => {
        try {
          const parsed   = parseJSON(elIn.value);
          const minified = JSON.stringify(parsed);
          setOutput(minified);
          refreshMeta();
          updateStats(minified);
          setValidity(true);
          setStatus("Minified ✓", "ok");
          setMsg("Minified successfully", "All unnecessary whitespace has been removed.", "ok");
        } catch (error) {
          setOutput("");
          refreshMeta();
          updateStats("");
          setValidity(false);
          setStatus("Error", "bad");
          setMsg("Parse error", error.message, "err");
        }
      };

      const clearAll = () => {
        elIn.value = "";
        setOutput("");
        refreshMeta();
        updateStats("");
        setValidity(false, true);
        setStatus("Ready");
        setMsg("Cleared", "Both input/output fields are now empty and ready for a new payload.");
      };

      /* ── Clipboard ────────────────────────────────────────── */
      const legacyCopy = (text) => {
        const temp = document.createElement("textarea");
        temp.value = text;
        temp.setAttribute("readonly", "");
        Object.assign(temp.style, { position: "fixed", top: "-9999px", opacity: "0" });
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
      };

      const copyOut = async () => {
        if (!elOut.value) { setMsg("Nothing to copy", "Generate output first.", "err"); return; }
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(elOut.value);
          } else {
            legacyCopy(elOut.value);
          }
          setStatus("Copied ✓", "ok");
          setMsg("Copied to clipboard", "The formatted JSON is ready to paste.", "ok");
        } catch (error) {
          setStatus("Error", "bad");
          setMsg("Copy failed", error.message || "Clipboard access failed.", "err");
        }
      };

      /* ── Download ─────────────────────────────────────────── */
      const download = () => {
        if (!elOut.value) { setMsg("Nothing to download", "Generate output first.", "err"); return; }
        const blob = new Blob([elOut.value], { type: "application/json" });
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement("a"), { href: url, download: "formatted.json" });
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setMsg("Download started", "Your formatted JSON file is being saved.", "ok");
      };

      /* ── Sample / file ────────────────────────────────────── */
      const loadSample = () => {
        elIn.value = JSON.stringify(sample);
        beautify();
      };

      const loadFile = async (file) => {
        if (!file) return;
        try {
          const text = await file.text();
          elIn.value = text;
          refreshMeta();
          setValidity(false, !text.trim());
          updateStats(text);
          setStatus("Loaded");
          setMsg("File loaded", `${file.name} loaded — click Beautify to format it.`, "ok");
        } catch (error) {
          setStatus("Error", "bad");
          setMsg("Upload failed", error.message || "Unable to read this file.", "err");
        }
      };

      /* ── Indent selector ──────────────────────────────────── */
      indentBtns.forEach((button) => {
        button.addEventListener("click", () => {
          indent = button.dataset.ind === "tab" ? "\t" : Number(button.dataset.ind);
          indentEl.textContent = button.dataset.ind === "tab" ? "Tab" : `${button.dataset.ind} spaces`;
          indentBtns.forEach((b) => b.setAttribute("aria-pressed", String(b === button)));
          if (elOut.value) beautify();
        });
      });

      /* ── Button event listeners ───────────────────────────── */
      document.getElementById("btn-beautify").addEventListener("click", beautify);
      document.getElementById("btn-minify")  .addEventListener("click", minify);
      document.getElementById("btn-clear")   .addEventListener("click", clearAll);
      document.getElementById("btn-copy")    .addEventListener("click", copyOut);
      document.getElementById("btn-download").addEventListener("click", download);
      document.getElementById("btn-sample")  .addEventListener("click", loadSample);
      viewRawBtn.addEventListener("click", () => setViewMode("raw"));
      viewTreeBtn.addEventListener("click", () => setViewMode("tree"));
      document.getElementById("btn-expand-all").addEventListener("click", expandAll);
      document.getElementById("btn-collapse-all").addEventListener("click", collapseAll);

      btnUpload.addEventListener("click", () => fileIn.click());
      fileIn.addEventListener("change", (event) => {
        loadFile(event.target.files[0]);
        fileIn.value = "";
      });

      /* ── Input change ─────────────────────────────────────── */
      elIn.addEventListener("input", () => {
        refreshMeta();
        if (!elIn.value.trim()) {
          setValidity(false, true);
          updateStats("");
          setStatus("Ready");
          setMsg("Ready", "Paste JSON, upload a file, or load the sample.");
          elIn.focus();
        } else {
          setStatus("Editing");
          updateStats(elIn.value);
        }
      });

      /* ── Scroll sync ──────────────────────────────────────── */
      elIn.addEventListener("scroll", () => syncScroll(elIn, lnIn));

      /* Output scroll: sync both line-numbers AND the highlight overlay */
      elOut.addEventListener("scroll", () => {
        syncScroll(elOut, lnOut);
        highlightOut.scrollTop  = elOut.scrollTop;
        highlightOut.scrollLeft = elOut.scrollLeft;
      });

      /* ── Drag-and-drop ────────────────────────────────────── */
      dropZone.addEventListener("dragover", (event) => {
        event.preventDefault();
        dropZone.style.outline = "2px dashed var(--color-primary)";
      });
      dropZone.addEventListener("dragleave", () => { dropZone.style.outline = ""; });
      dropZone.addEventListener("drop", (event) => {
        event.preventDefault();
        dropZone.style.outline = "";
        const file = event.dataTransfer.files[0];
        if (file) loadFile(file);
      });

      /* ── Keyboard shortcuts ───────────────────────────────── */
      document.addEventListener("keydown", (event) => {
        const ctrl = event.ctrlKey || event.metaKey;

        if (ctrl && event.key === "Enter") {
          event.preventDefault();
          beautify();
        }
        if (ctrl && event.key.toLowerCase() === "m" && !event.shiftKey) {
          event.preventDefault();
          minify();
        }
        if (ctrl && event.shiftKey && event.key.toLowerCase() === "c") {
          event.preventDefault();
          copyOut();
        }
        if (ctrl && event.shiftKey && event.key.toLowerCase() === "x") {
          event.preventDefault();
          clearAll();
        }
      });

      /* ── Initial state ────────────────────────────────────── */
      refreshMeta();
      setValidity(false, true);
      setStatus("Ready");
      setMsg("Ready", "Paste JSON, upload a file, or load the sample.");
    })();
  </script>
</body>
</html>
